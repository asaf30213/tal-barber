<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tal Cohen | Barbershop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card-hover: #1c1c1c;
      --accent: #c8a45a;
      --accent-light: rgba(200, 164, 90, 0.12);
      --text: #e8e8e8;
      --dim: #888;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .landing {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      overflow: hidden;
      box-shadow: 0 0 30px rgba(200, 164, 90, 0.15);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
    }

    .name span { color: var(--accent); }

    .tagline {
      font-size: 0.85rem;
      color: var(--dim);
      text-align: center;
      margin-top: -16px;
      font-weight: 300;
      line-height: 1.6;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--dim);
      margin-top: -12px;
    }

    .location svg { flex-shrink: 0; }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--card-hover);
      border-color: rgba(200, 164, 90, 0.2);
      transform: translateY(-1px);
    }

    .link-btn svg { flex-shrink: 0; }

    .link-btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 700;
    }

    .link-btn.primary:hover {
      opacity: 0.9;
      background: var(--accent);
    }

    .link-btn.whatsapp:hover {
      border-color: #25d366;
      color: #25d366;
    }

    .hours {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      text-align: center;
    }

    .hours-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--dim);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .hours-row:last-child { border-bottom: none; }
    .hours-row span:first-child { font-weight: 500; color: var(--text); }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .footer-text {
      font-size: 0.7rem;
      color: rgba(136, 136, 136, 0.5);
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="avatar">
      <img src="/tal-barber/tal-about.jpg" alt="Tal Cohen" />
    </div>

    <h1 class="name">TAL <span>COHEN</span></h1>
    <p class="tagline">Barbershop - Gesher Haziv</p>

    <div class="location">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      <span>קיבוץ גשר הזיו, רחוב נתיב היערה</span>
    </div>

    <div class="links">
      <a href="https://wa.me/972587306008?text=%D7%94%D7%99%D7%99%20%D7%98%D7%9C%2C%20%D7%90%D7%A9%D7%9E%D7%97%20%D7%9C%D7%A7%D7%91%D7%95%D7%A2%20%D7%AA%D7%95%D7%A8" target="_blank" rel="noopener" class="link-btn primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.69 2 12.36c0 1.83.48 3.56 1.32 5.06L2 22l4.73-1.24A9.85 9.85 0 0012 22c5.52 0 10-4.17 10-9.64S17.52 2 12 2zm0 17.6c-1.58 0-3.08-.41-4.38-1.14l-.31-.18-3.24.85.86-3.15-.2-.32A7.56 7.56 0 014 12.36C4 7.8 7.58 4.4 12 4.4s8 3.4 8 7.96-3.58 7.24-8 7.24z"/>
        </svg>
        קביעת תור בוואטסאפ
      </a>

      <a href="tel:0587306008" class="link-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.13.81.36 1.6.7 2.35a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.75.34 1.54.57 2.35.7A2 2 0 0122 16.92z"/>
        </svg>
        058-730-6008
      </a>

      <a href="https://asaf30213.github.io/tal-barber/" target="_blank" rel="noopener" class="link-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        האתר שלנו
      </a>

      <a href="https://maps.google.com/?q=Gesher+Haziv+Nativ+Hayaara" target="_blank" rel="noopener" class="link-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        נווט למספרה
      </a>
    </div>

    <div class="divider"></div>

    <div class="hours">
      <div class="hours-title">שעות פעילות</div>
      <div class="hours-row"><span>א' - ה'</span><span>09:00 - 20:00</span></div>
      <div class="hours-row"><span>ו'</span><span>08:00 - 14:00</span></div>
      <div class="hours-row"><span>שבת</span><span>סגור</span></div>
    </div>

    <div class="footer-text">&copy; 2026 Tal Cohen Barbershop</div>
  </div>
</body>
</html>
